short_bio: >-
  <p>
    Fascinated by the behavior and interactions of fluids, deformable materials, and rigid bodies, my research focuses on developing physically based animation methods for a wide range of materials and objects. 
    While my background lies in computer graphics, I value aesthetically compelling simulation results just as much as physically grounded realism.
  </p>
  <p>
    During my Ph.D., I investigated ways to expand the range of applications for particle-based simulation methods, with a particular focus on smoothed particle hydrodynamics. 
    The steady flow of new ideas in the field, combined with advancing hardware capabilities and increasingly impressive simulation results, highlights the exciting future of computer animation and simulation. 
    I'm happy to be part of all this!
  </p>

