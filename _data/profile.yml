short_bio: >-
  <p>
    Fascinated by the behavior and interactions of fluids, deformable materials, and rigid bodies, my research focuses on developing physically based animation methods for a wide range of materials and objects. 
    While my background lies in computer graphics, I value aesthetically compelling simulation results just as much as physically grounded realism.
  </p>
  <p>
    My doctoral research focused on extending the range of particle-based simulation methods, with a particular emphasis on smoothed particle hydrodynamics.
    I'm excited by the steady flow of new ideas from the community that result in simulation results with increasingly complex dynamics, geometry and material interactions. 
    For me, not only the ongoing progress but the depth of still unsolved problems keep me in the field of computer animation and simulation. 
    I aim to push the state of multi-material simulation in both robustness and physical fidelity through new solvers, discretizations and methods where existing approaches reach their limits.
  </p>

